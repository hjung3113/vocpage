name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  build-fe:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      - run: npm run -w frontend typecheck
      # TODO(Wave 0-11): add lint step once frontend lint script is added
      - run: npm run -w frontend build

  build-be:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      - run: npm run -w backend typecheck
      - run: npm run -w backend build

  lint-root:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      - run: npx eslint . --max-warnings=0

  fixture-seed-parity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      # TODO(Wave 0-14): script added by fixture-seed-parity agent
      - if: hashFiles('scripts/check-fixture-seed-parity.ts') != ''
        run: npx tsx scripts/check-fixture-seed-parity.ts
