openapi: 3.1.0
info:
  title: VOCPage API
  version: 0.0.1
  description: VOC (Voice of Customer) management system REST API

servers:
  - url: /api
    description: Local dev

tags:
  - name: auth
  - name: health
  - name: vocs
  - name: comments
  - name: notes
  - name: attachments
  - name: tags
  - name: notifications
  - name: dashboard
  - name: admin
  - name: files

paths:
  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, db, uptime]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  db:
                    type: string
                    enum: [ok]
                  uptime:
                    type: number

  /auth/mock-login:
    post:
      tags: [auth]
      operationId: mockLogin
      summary: Mock login (dev only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, manager, dev, user]
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /auth/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs:
    get:
      tags: [vocs]
      operationId: listVocs
      summary: List VOCs (paginated)
      parameters:
        - $ref: '#/components/parameters/page'
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [issue_code, title, status, assignee, priority, created_at]
            default: created_at
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: status
          in: query
          description: Repeat to filter by multiple statuses.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/VocStatus'
          style: form
          explode: true
        - name: priorities
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/VocPriority'
          style: form
          explode: true
        - name: system_id
          in: query
          schema:
            type: string
            format: uuid
        - name: voc_type_ids
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: assignees
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: tag_ids
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: q
          in: query
          schema:
            type: string
            maxLength: 120
        - name: includeDeleted
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated VOC list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVocs'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [vocs]
      operationId: createVoc
      summary: Create VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [vocs]
      operationId: getVoc
      summary: Get VOC detail
      responses:
        '200':
          description: VOC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [vocs]
      operationId: updateVoc
      summary: Update VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocPatch'
      responses:
        '200':
          description: Updated VOC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [vocs]
      operationId: deleteVoc
      summary: Soft-delete VOC (admin only)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/status:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [vocs]
      operationId: updateVocStatus
      summary: Update VOC status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/VocStatus'
      responses:
        '200':
          description: Updated VOC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/comments:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [comments]
      operationId: listComments
      summary: List comments for a VOC (created_at ASC, max 200)
      description: |
        Returns up to 200 comments ordered by created_at ASC.
        Requires VOC read access. Internal notes are never included.
        See feature-voc.md §8.13.
      responses:
        '200':
          description: Comment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [comments]
      operationId: createComment
      summary: Add comment to VOC
      description: |
        Any authenticated user may comment on a non-deleted VOC.
        Body is HTML (Toast UI output), max 16 KB. Empty or
        whitespace-only HTML is rejected with 422 BODY_REQUIRED.
        Fires notifyOnComment for author + assignee (debounced 5 min).
        See feature-voc.md §8.13.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentInput'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (BODY_REQUIRED or BODY_TOO_LARGE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /vocs/{id}/comments/{commentId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: commentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [comments]
      operationId: updateComment
      summary: Update comment (author or admin only)
      description: |
        Author or admin may update a comment body. updated_at is auto-refreshed.
        Empty body → 422 BODY_REQUIRED. See feature-voc.md §8.13.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentInput'
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Validation error (BODY_REQUIRED or BODY_TOO_LARGE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [comments]
      operationId: deleteComment
      summary: Hard-delete comment (author or admin only)
      description: |
        Hard delete — no soft delete, no audit log entry (spec §8.13).
        Author or admin only. See feature-voc.md §8.13.
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/notes:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [notes]
      operationId: listNotes
      summary: List internal notes (manager/admin only)
      responses:
        '200':
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [notes]
      operationId: createNote
      summary: Add internal note (manager/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '201':
          description: Created note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vocs/{id}/notes/{noteId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: noteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [notes]
      operationId: updateNote
      summary: Update internal note (manager/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '200':
          description: Updated note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [notes]
      operationId: deleteNote
      summary: Delete internal note (manager/admin only)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/attachments:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [attachments]
      operationId: listAttachments
      summary: List attachments for VOC
      responses:
        '200':
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [attachments]
      operationId: uploadAttachment
      summary: Upload attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}/attachments/{attachmentId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: attachmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [attachments]
      operationId: deleteAttachment
      summary: Delete attachment
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tags:
    get:
      tags: [tags]
      operationId: listTags
      summary: List all tags
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/assignees:
    get:
      tags: [masters]
      operationId: listAssignees
      summary: List assignable users (admin/manager/dev) for filter dropdowns
      responses:
        '200':
          description: Assignees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssigneeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/tags:
    get:
      tags: [masters]
      operationId: listMasterTags
      summary: List tags for filter dropdowns
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/voc-types:
    get:
      tags: [masters]
      operationId: listMasterVocTypes
      summary: List VOC types for filter dropdowns
      responses:
        '200':
          description: VOC types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocTypeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/systems:
    get:
      tags: [masters]
      operationId: listMasterSystems
      summary: List active systems with nested active menus (VOC create cascade)
      responses:
        '200':
          description: Systems with nested menus (archived rows excluded)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/menus:
    get:
      tags: [masters]
      operationId: listMasterMenus
      summary: List menus (admin only — supports system_id filter and includeArchived)
      parameters:
        - in: query
          name: system_id
          schema:
            type: string
            format: uuid
        - in: query
          name: includeArchived
          schema:
            type: boolean
      responses:
        '200':
          description: Menus
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vocs/{id}/tags:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [tags]
      operationId: addVocTag
      summary: Add tag to VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagId]
              properties:
                tagId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Tag added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}/tags/{tagId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: tagId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [tags]
      operationId: removeVocTag
      summary: Remove tag from VOC
      responses:
        '200':
          description: Tag removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications:
    get:
      tags: [notifications]
      operationId: listNotifications
      summary: List notifications for current user (with isUrgent join + lazy trim)
      description: |
        Returns up to 50 most recent notifications. Lazy trim runs on every
        call: deletes rows older than 30 days and trims per-user beyond the
        50-row cap (Wave 5 W5-D4). `isUrgent` is computed at read time from
        the joined `vocs.priority` (W5-D2) — Urgent demotion auto-clears the
        flag on the next call.
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/unread-count:
    get:
      tags: [notifications]
      operationId: getUnreadCount
      summary: Get unread notification count (ETag/304)
      description: |
        Returns the unread count for the current user. Response carries an
        ETag derived from `(count, latest_unread_id, latest_unread_created_at)`.
        Conditional GET with `If-None-Match` returns 304 with no body
        (Wave 5 W5-D7, 30-second polling endpoint).
      parameters:
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Count
          headers:
            ETag:
              schema:
                type: string
              description: Strong-ish hash of the unread state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '304':
          description: Not Modified — unread state unchanged since the supplied ETag.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/mark-all-read:
    post:
      tags: [notifications]
      operationId: markAllRead
      summary: Mark every unread notification of the current user as read
      responses:
        '200':
          description: Marked all read
          content:
            application/json:
              schema:
                type: object
                required: [unreadCount]
                properties:
                  unreadCount:
                    type: integer
                    enum: [0]
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [notifications]
      operationId: markNotificationRead
      summary: Mark notification as read
      responses:
        '200':
          description: Marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /dashboard/summary:
    get:
      tags: [dashboard]
      operationId: getDashboardSummary
      summary: Get KPI summary (8 metrics — Volume + Quality)
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
        - $ref: '#/components/parameters/dashboardRange'
      responses:
        '200':
          description: KPI summary (Volume + Quality, 8 metrics)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/distribution:
    get:
      tags: [dashboard]
      operationId: getDashboardDistribution
      summary: Get distribution by type (status/priority/voc_type/tag)
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [status, priority, voc_type, tag]
        - name: dim
          in: query
          schema:
            type: string
            enum: [all, system, menu]
            default: all
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Distribution response with items array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/priority-status-matrix:
    get:
      tags: [dashboard]
      operationId: getPriorityStatusMatrix
      summary: Get priority × status matrix (4 priorities × 5 statuses)
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Priority-status matrix with intensity normalisation value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriorityStatusMatrixResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/heatmap:
    get:
      tags: [dashboard]
      operationId: getDashboardHeatmap
      summary: Get drilldown heatmap (system/menu × status|priority|tag)
      parameters:
        - name: xAxis
          in: query
          schema:
            type: string
            enum: [status, priority, tag]
            default: status
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Heatmap with headers, totalRow, rows, and max_value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeatmapResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/weekly-trend:
    get:
      tags: [dashboard]
