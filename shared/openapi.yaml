      type: object
      required: [id, name, avg_days, sla_rate, completed_count, slaEligibleCount, missingDueDateCount]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        avg_days:
          description: >-
            Average processing days: AVG(status_changed_at::date - created_at::date)
            WHERE status='완료'. Uses status_changed_at — there is NO completed_at column.
          type: number
          nullable: true
        sla_rate:
          description: >-
            Percentage of completed VOCs finished by their due_date.
            Null when slaEligibleCount === 0 (no completed VOCs with non-null
            due_date). SLA check: status_changed_at::date <= due_date.
          type: number
          minimum: 0
          maximum: 100
          nullable: true
        completed_count:
          type: integer
          minimum: 0
        slaEligibleCount:
          description: Completed VOCs with a non-null due_date (SLA denominator). When 0, sla_rate is null.
          type: integer
          minimum: 0
        missingDueDateCount:
          description: Completed VOCs with a null due_date — excluded from SLA computation.
          type: integer
          minimum: 0

