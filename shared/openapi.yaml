      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        kind:
          type: string
          enum: [general, menu]

    TagMasterPatch:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }

    TagMasterMergeInput:
      type: object
      required: [targetId]
      properties:
        targetId: { type: string, format: uuid }

    TagExternalToggle:
      type: object
      required: [is_external]
      properties:
        is_external: { type: boolean }

    TagRuleSuspendInput:
      type: object
      required: [suspended_until]
      properties:
        suspended_until:
          type: string
          format: date-time
          nullable: true

    TrashListItem:
      type: object
      required: [id, issue_code, title, status, system_id, menu_id, deleted_by, deleted_at]
      properties:
        id: { type: string, format: uuid }
        issue_code: { type: string }
        title: { type: string }
        status: { $ref: '#/components/schemas/VocStatus' }
        system_id: { type: string, format: uuid }
        menu_id: { type: string, format: uuid }
        deleted_by: { type: string, format: uuid, nullable: true }
        deleted_at: { type: string, format: date-time }

    TrashListResponse:
      type: object
      required: [rows, page, per_page, total]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/TrashListItem' }
        page: { type: integer, minimum: 1 }
        per_page: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }

    VocRestoreLogEntry:
      type: object
      required: [id, voc_id, action, actor_id, before_deleted_at, before_deleted_by, created_at]
      properties:
        id: { type: string, format: uuid }
        voc_id: { type: string, format: uuid }
        action:
          type: string
          enum: [restore, hard_delete]
        actor_id: { type: string, format: uuid }
        before_deleted_at: { type: string, format: date-time, nullable: true }
        before_deleted_by: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    VocRestoreResponse:
      type: object
      required: [voc_id, restored_at, audit]
      properties:
        voc_id: { type: string, format: uuid }
        restored_at: { type: string, format: date-time }
        audit: { $ref: '#/components/schemas/VocRestoreLogEntry' }

    AdminUserItem:
      type: object
      required: [id, ad_username, display_name, email, role, is_active, created_at]
      properties:
        id: { type: string, format: uuid }
        ad_username: { type: string }
        display_name: { type: string }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/UserRole' }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    AdminUserListResponse:
      type: object
      required: [rows, page, per_page, total]
      properties:
        rows:
          type: array
          items: { $ref: '#/components/schemas/AdminUserItem' }
        page: { type: integer, minimum: 1 }
        per_page: { type: integer, minimum: 1 }
        total: { type: integer, minimum: 0 }

    AdminUserPatch:
      # At least one of `role` / `is_active` required (mirrors zod .refine()).
      type: object
      anyOf:
        - required: [role]
        - required: [is_active]
      properties:
        role: { $ref: '#/components/schemas/UserRole' }
        is_active: { type: boolean }
        reason: { type: string, maxLength: 500 }

    UserRoleLogEntry:
      type: object
      required: [id, user_id, changed_by, old_role, new_role, old_active, new_active, reason, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        changed_by: { type: string, format: uuid }
        old_role:
          type: string
          enum: [user, dev, manager, admin]
          nullable: true
        new_role:
          type: string
          enum: [user, dev, manager, admin]
          nullable: true
        old_active: { type: boolean, nullable: true }
        new_active: { type: boolean, nullable: true }
        reason: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    VocPayloadHistory:
      type: object
      required: [id, voc_id, payload, submitted_by, submitted_at, is_current]
      properties:
        id:
          type: string
          format: uuid
        voc_id:
          type: string
          format: uuid
        payload:
          type: object
          additionalProperties: true
        submitted_by:
          type: string
          format: uuid
        submitted_at:
          type: string
          format: date-time
        final_state:
          type: string
          nullable: true
        is_current:
          type: boolean

    Notice:
      type: object
      required:
        [id, title, body, level, is_popup, is_visible, author_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        level: { type: string, enum: [normal, important, urgent] }
        is_popup: { type: boolean }
        is_visible: { type: boolean }
        visible_from: { type: string, format: date-time, nullable: true }
        visible_to: { type: string, format: date-time, nullable: true }
        author_id: { type: string, format: uuid }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NoticeInput:
      type: object
      required: [title, body]
      properties:
        title: { type: string }
        body: { type: string }
        level: { type: string, enum: [normal, important, urgent] }
        is_popup: { type: boolean }
        is_visible: { type: boolean }
        visible_from: { type: string, format: date-time, nullable: true }
        visible_to: { type: string, format: date-time, nullable: true }

    FaqCategory:
      type: object
      required: [id, name, slug, sort_order, is_archived]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        sort_order: { type: integer }
        is_archived: { type: boolean }

    FaqCategoryInput:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        sort_order: { type: integer }
        is_archived: { type: boolean }

    Faq:
      type: object
      required:
        [id, question, answer, category_id, is_visible, sort_order, author_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        question: { type: string }
        answer: { type: string }
        category_id: { type: string, format: uuid }
        is_visible: { type: boolean }
        sort_order: { type: integer }
        author_id: { type: string, format: uuid }
        deleted_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    FaqInput:
      type: object
      required: [question, answer, category_id]
      properties:
        question: { type: string }
        answer: { type: string }
        category_id: { type: string, format: uuid }
        is_visible: { type: boolean }
        sort_order: { type: integer }
