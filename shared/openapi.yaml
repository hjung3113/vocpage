components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    dashboardSystemId:
      name: systemId
      in: query
      schema:
        type: string
        format: uuid
    dashboardMenuId:
      name: menuId
      in: query
      schema:
        type: string
        format: uuid
    dashboardAssigneeId:
      name: assigneeId
      in: query
      schema:
        type: string
        format: uuid
    dashboardStartDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date
    dashboardEndDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    UserRole:
      type: string
      enum: [user, manager, admin, dev]

    AuthUser:
      type: object
      required: [id, display_name, email, role]
      properties:
        id:
          type: string
          format: uuid
        ad_username:
          type: string
          nullable: true
        display_name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    User:
      type: object
      required: [id, ad_username, display_name, email, role, is_active]
      properties:
        id:
          type: string
          format: uuid
        ad_username:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean

    VocStatus:
      type: string
