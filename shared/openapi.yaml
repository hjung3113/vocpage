        - name: menu_id
          in: query
          schema: { type: string, format: uuid }
        - name: q
          in: query
          schema: { type: string }
        - name: deleted_from
          in: query
          schema: { type: string, format: date-time }
        - name: deleted_to
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Trash list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrashListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          # ADR 0004 §3: Trash hidden from non-admin as 404 ("존재 자체 은닉"), not 403.
          $ref: '#/components/responses/NotFound'

  /admin/vocs/{id}/restore-log:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [admin]
      operationId: adminVocRestoreLog
      summary: Read voc_restore_log entries (admin only)
      responses:
        '200':
          description: Restore log entries (oldest → newest)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VocRestoreLogEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          # ADR 0005: hidden from non-admin as 404 ("존재 자체 은닉"), not 403.
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/restore:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [vocs]
      operationId: restoreVoc
      summary: Restore soft-deleted VOC (admin only — re-runs tag_rules)
      responses:
        '200':
          description: Restored VOC + audit row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocRestoreResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          # ADR 0005: hidden from non-admin as 404, not 403.
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/users/{id}/role-log:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [admin]
      operationId: adminUserRoleLog
      summary: Read user_role_log entries (admin only — PIPA 7y)
      responses:
        '200':
          description: Role log entries (newest → oldest)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRoleLogEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/masters/refresh:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [vocs]
      operationId: refreshVocMasters
      summary: Refresh master data for a VOC
      responses:
        '200':
          description: Refresh result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MasterRefreshResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/payload:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [vocs]
      operationId: submitVocPayload
      summary: Submit structured payload for a VOC
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [equipment, maker, model, process, symptom, root_cause, resolution]
              properties:
                equipment:
                  type: string
                maker:
                  type: string
                model:
                  type: string
                process:
                  type: string
                symptom:
                  type: string
                root_cause:
                  type: string
                resolution:
                  type: string
                unverified_fields:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Submitted payload history entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocPayloadHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/payload-history:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [vocs]
      operationId: getVocPayloadHistory
      summary: Get payload submission history for a VOC
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payload history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VocPayloadHistory'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/payload-review:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [vocs]
      operationId: reviewVocPayload
      summary: Approve or reject a VOC payload (Result Review)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: ['approve', 'reject']
                comment:
                  type: string
                  nullable: true
                  description: required when decision='reject'
      responses:
        '201':
          description: Review recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/timeline:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [vocs]
      operationId: getVocTimeline
      summary: Get VOC timeline events (Manager/Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Timeline event list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [files]
      operationId: downloadFile
      summary: Download file by ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File binary content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /notices:
    get:
      tags: [notices]
      operationId: listNotices
      summary: List notices (visibility-filtered for non-admin)
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: mode
          in: query
          schema: { type: string, enum: [user, admin], default: user }
        - name: includeDeleted
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Notice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: { $ref: '#/components/schemas/Notice' }
                  page: { type: integer }
                  per_page: { type: integer }
                  total: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [notices]
      operationId: createNotice
      summary: Create notice (admin/manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoticeInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Notice' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notices/popup:
    get:
      tags: [notices]
      operationId: listPopupNotices
      summary: Login popup notices (BE stateless; FE owns dismiss state via localStorage per spec §10.3.2)
      responses:
        '200':
          description: Popup notices
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: { $ref: '#/components/schemas/Notice' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /notices/{id}:
    get:
      tags: [notices]
      operationId: getNotice
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200':
          description: Notice
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Notice' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [notices]
      operationId: updateNotice
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NoticeInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Notice' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [notices]
      operationId: deleteNotice
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '204': { description: Soft-deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /notices/{id}/restore:
    post:
      tags: [notices]
      operationId: restoreNotice
      summary: Restore soft-deleted notice (admin only)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Notice' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /faqs:
    get:
      tags: [faqs]
      operationId: listFaqs
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: category_id
          in: query
          schema: { type: string, format: uuid }
        - name: q
          in: query
          schema: { type: string, maxLength: 120 }
        - name: mode
          in: query
          schema: { type: string, enum: [user, admin], default: user }
        - name: includeDeleted
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: FAQ list
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: { $ref: '#/components/schemas/Faq' }
                  page: { type: integer }
                  per_page: { type: integer }
                  total: { type: integer }
    post:
      tags: [faqs]
      operationId: createFaq
      summary: Create FAQ (admin/manager)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaqInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Faq' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /faqs/{id}:
    get:
      tags: [faqs]
      operationId: getFaq
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200':
          description: FAQ
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Faq' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [faqs]
      operationId: updateFaq
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaqInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Faq' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [faqs]
      operationId: deleteFaq
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '204': { description: Soft-deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /faqs/{id}/restore:
    post:
      tags: [faqs]
      operationId: restoreFaq
      summary: Restore soft-deleted FAQ (admin only)
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Faq' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /faq-categories:
    get:
      tags: [faqs]
      operationId: listFaqCategories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items: { $ref: '#/components/schemas/FaqCategory' }
    post:
      tags: [faqs]
      operationId: createFaqCategory
      summary: Create FAQ category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaqCategoryInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqCategory' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /faq-categories/{id}:
    patch:
      tags: [faqs]
      operationId: updateFaqCategory
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaqCategoryInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaqCategory' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [faqs]
      operationId: deleteFaqCategory
      summary: Delete category (admin only). Returns 409 CATEGORY_HAS_ITEMS if FAQs are still attached.
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Category has FAQ items
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

components:
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    dashboardSystemId:
      name: systemId
      in: query
      schema:
        type: string
        format: uuid
    dashboardMenuId:
      name: menuId
      in: query
      schema:
        type: string
        format: uuid
    dashboardAssigneeId:
      name: assigneeId
      in: query
      schema:
        type: string
        format: uuid
    dashboardStartDate:
      name: startDate
      in: query
      schema:
        type: string
        format: date
    dashboardEndDate:
      name: endDate
      in: query
      schema:
        type: string
        format: date
    dashboardRange:
      name: range
      in: query
      description: Date-range preset. Overrides the user's default_date_range. Required iff using a fixed window; with `custom`, supply startDate+endDate.
      schema:
        type: string
        enum: [1m, 3m, 1y, all, custom]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    UserRole:
      type: string
      enum: [user, manager, admin, dev]

    AuthUser:
      type: object
      required: [id, display_name, email, role]
      properties:
        id:
          type: string
          format: uuid
        ad_username:
          type: string
          nullable: true
        display_name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'

    User:
      type: object
      required: [id, ad_username, display_name, email, role, is_active]
      properties:
        id:
          type: string
          format: uuid
        ad_username:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        is_active:
          type: boolean

    VocStatus:
      type: string
      enum: ['접수', '검토중', '처리중', '완료', '드랍']

    VocPriority:
      type: string
      enum: [urgent, high, medium, low]

    VocSource:
      type: string
      enum: [manual, import]

    Voc:
      type: object
      required: [id, issue_code, sequence_no, title, status, priority, voc_type_id, system_id, menu_id, source, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        issue_code:
          type: string
        sequence_no:
          type: integer
        title:
          type: string
        body:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/VocStatus'
        priority:
          $ref: '#/components/schemas/VocPriority'
        voc_type_id:
          type: string
          format: uuid
        system_id:
          type: string
          format: uuid
        menu_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
          nullable: true
        author_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        source:
          $ref: '#/components/schemas/VocSource'
        review_status:
          type: string
          nullable: true
        structured_payload:
          type: object
          additionalProperties: true
          nullable: true
        resolution_quality:
          type: string
          enum: ['근본해결', '임시조치']
          nullable: true
        drop_reason:
          type: string
          enum: ['중복', '정책거부', '재현불가', '범위외', '기타']
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true

    VocInput:
      type: object
      required: [title, status, priority, voc_type_id, system_id, menu_id]
      properties:
        title:
          type: string
        body:
          type: string
        status:
          $ref: '#/components/schemas/VocStatus'
        priority:
          $ref: '#/components/schemas/VocPriority'
        voc_type_id:
          type: string
          format: uuid
        system_id:
          type: string
          format: uuid
        menu_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        source:
          $ref: '#/components/schemas/VocSource'

    VocPatch:
      type: object
      properties:
        title:
          type: string
        body:
          type: string
        status:
          $ref: '#/components/schemas/VocStatus'
        priority:
          $ref: '#/components/schemas/VocPriority'
        voc_type_id:
          type: string
          format: uuid
        system_id:
          type: string
          format: uuid
        menu_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        review_status:
          type: string
          enum: ['unverified', 'approved', 'rejected', 'pending_deletion']
        resolution_quality:
          type: string
          enum: ['근본해결', '임시조치']
        drop_reason:
          type: string
          enum: ['중복', '정책거부', '재현불가', '범위외', '기타']

    Comment:
      type: object
      required: [id, voc_id, author_id, body, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        voc_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CommentListResponse:
      type: object
      required: [rows]
      properties:
        rows:
          type: array
          items:
            $ref: '#/components/schemas/Comment'

    CommentResponse:
      type: object
      required: [comment]
      properties:
        comment:
          $ref: '#/components/schemas/Comment'

    CreateCommentInput:
      type: object
      required: [body]
      properties:
        body:
          type: string
          description: HTML string (Toast UI output). Max 16 KB. Empty / whitespace-only rejected.
          maxLength: 16384

    Note:
      type: object
      required: [id, voc_id, author_id, body, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        voc_id:
          type: string
          format: uuid
        author_id:
          type: string
          format: uuid
        body:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    Attachment:
      type: object
      required: [id, voc_id, filename, original_name, mime_type, size, url, created_at]
      properties:
        id:
          type: string
          format: uuid
        voc_id:
          type: string
          format: uuid
        filename:
          type: string
        original_name:
          type: string
        mime_type:
          type: string
        size:
          type: integer
        url:
