openapi: 3.1.0
info:
  title: VOCPage API
  version: 0.0.1
  description: VOC (Voice of Customer) management system REST API

servers:
  - url: /api
    description: Local dev

tags:
  - name: auth
  - name: health
  - name: vocs
  - name: comments
  - name: notes
  - name: attachments
  - name: tags
  - name: notifications
  - name: dashboard
  - name: admin
  - name: files

paths:
  /health:
    get:
      tags: [health]
      operationId: getHealth
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status, db, uptime]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  db:
                    type: string
                    enum: [ok]
                  uptime:
                    type: number

  /auth/mock-login:
    post:
      tags: [auth]
      operationId: mockLogin
      summary: Mock login (dev only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, manager, dev, user]
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      summary: Logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /auth/me:
    get:
      tags: [auth]
      operationId: getMe
      summary: Get current user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs:
    get:
      tags: [vocs]
      operationId: listVocs
      summary: List VOCs (paginated)
      parameters:
        - $ref: '#/components/parameters/page'
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, updated_at, priority, status, due_date, issue_code]
            default: created_at
        - name: sort_dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: status
          in: query
          description: Repeat to filter by multiple statuses.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/VocStatus'
          style: form
          explode: true
        - name: priorities
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/VocPriority'
          style: form
          explode: true
        - name: system_id
          in: query
          schema:
            type: string
            format: uuid
        - name: voc_type_ids
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: assignees
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: tag_ids
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: q
          in: query
          schema:
            type: string
            maxLength: 120
        - name: includeDeleted
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated VOC list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedVocs'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [vocs]
      operationId: createVoc
      summary: Create VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [vocs]
      operationId: getVoc
      summary: Get VOC detail
      responses:
        '200':
          description: VOC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [vocs]
      operationId: updateVoc
      summary: Update VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VocPatch'
      responses:
        '200':
          description: Updated VOC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [vocs]
      operationId: deleteVoc
      summary: Soft-delete VOC (admin only)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/status:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [vocs]
      operationId: updateVocStatus
      summary: Update VOC status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/VocStatus'
      responses:
        '200':
          description: Updated VOC
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Voc'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/comments:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [comments]
      operationId: listComments
      summary: List comments for VOC
      responses:
        '200':
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [comments]
      operationId: createComment
      summary: Add comment to VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}/comments/{commentId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: commentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [comments]
      operationId: updateComment
      summary: Update comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [comments]
      operationId: deleteComment
      summary: Delete comment
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/notes:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [notes]
      operationId: listNotes
      summary: List internal notes (manager/admin only)
      responses:
        '200':
          description: Notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [notes]
      operationId: createNote
      summary: Add internal note (manager/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '201':
          description: Created note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /vocs/{id}/notes/{noteId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: noteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [notes]
      operationId: updateNote
      summary: Update internal note (manager/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
      responses:
        '200':
          description: Updated note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [notes]
      operationId: deleteNote
      summary: Delete internal note (manager/admin only)
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /vocs/{id}/attachments:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [attachments]
      operationId: listAttachments
      summary: List attachments for VOC
      responses:
        '200':
          description: Attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [attachments]
      operationId: uploadAttachment
      summary: Upload attachment
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}/attachments/{attachmentId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: attachmentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [attachments]
      operationId: deleteAttachment
      summary: Delete attachment
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /tags:
    get:
      tags: [tags]
      operationId: listTags
      summary: List all tags
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/assignees:
    get:
      tags: [masters]
      operationId: listAssignees
      summary: List assignable users (admin/manager/dev) for filter dropdowns
      responses:
        '200':
          description: Assignees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssigneeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/tags:
    get:
      tags: [masters]
      operationId: listMasterTags
      summary: List tags for filter dropdowns
      responses:
        '200':
          description: Tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /masters/voc-types:
    get:
      tags: [masters]
      operationId: listMasterVocTypes
      summary: List VOC types for filter dropdowns
      responses:
        '200':
          description: VOC types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocTypeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}/tags:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [tags]
      operationId: addVocTag
      summary: Add tag to VOC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagId]
              properties:
                tagId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Tag added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocs/{id}/tags/{tagId}:
    parameters:
      - $ref: '#/components/parameters/id'
      - name: tagId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [tags]
      operationId: removeVocTag
      summary: Remove tag from VOC
      responses:
        '200':
          description: Tag removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications:
    get:
      tags: [notifications]
      operationId: listNotifications
      summary: List notifications for current user
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/unread-count:
    get:
      tags: [notifications]
      operationId: getUnreadCount
      summary: Get unread notification count
      responses:
        '200':
          description: Count
          content:
            application/json:
              schema:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [notifications]
      operationId: markNotificationRead
      summary: Mark notification as read
      responses:
        '200':
          description: Marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /dashboard/summary:
    get:
      tags: [dashboard]
      operationId: getDashboardSummary
      summary: Get KPI summary (8 metrics)
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: KPI summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/distribution:
    get:
      tags: [dashboard]
      operationId: getDashboardDistribution
      summary: Get distribution by type
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [status, priority, voc_type, tag]
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Distribution array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DistributionItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/priority-status-matrix:
    get:
      tags: [dashboard]
      operationId: getPriorityStatusMatrix
      summary: Get priority-status matrix
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Matrix
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/heatmap:
    get:
      tags: [dashboard]
      operationId: getDashboardHeatmap
      summary: Get heatmap data
      parameters:
        - name: xAxis
          in: query
          schema:
            type: string
            enum: [status, priority, tag]
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Heatmap
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/weekly-trend:
    get:
      tags: [dashboard]
      operationId: getWeeklyTrend
      summary: Get weekly trend
      parameters:
        - name: weeks
          in: query
          schema:
            type: integer
            default: 12
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Trend array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeeklyTrendItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/tag-distribution:
    get:
      tags: [dashboard]
      operationId: getTagDistribution
      summary: Get tag distribution
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Tag stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TagStatItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/system-overview:
    get:
      tags: [dashboard]
      operationId: getSystemOverview
      summary: Get system overview stats
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: System stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemStatItem'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/assignee-stats:
    get:
      tags: [dashboard]
      operationId: getAssigneeStats
      summary: Get assignee stats
      parameters:
        - name: xAxis
          in: query
          schema:
            type: string
            enum: [status, priority, tag]
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Assignee stats
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/processing-speed:
    get:
      tags: [dashboard]
      operationId: getProcessingSpeed
      summary: Get processing speed (SLA table)
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: SLA table
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/aging:
    get:
      tags: [dashboard]
      operationId: getAging
      summary: Get aging bar data
      parameters:
        - $ref: '#/components/parameters/dashboardSystemId'
        - $ref: '#/components/parameters/dashboardMenuId'
        - $ref: '#/components/parameters/dashboardAssigneeId'
        - $ref: '#/components/parameters/dashboardStartDate'
        - $ref: '#/components/parameters/dashboardEndDate'
      responses:
        '200':
          description: Aging bar data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard/aging-vocs:
    get:
      tags: [dashboard]
      operationId: getAgingVocs
      summary: Get top aging VOCs
